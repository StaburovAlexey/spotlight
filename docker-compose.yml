services:
  postgres:
    image: postgres:17-alpine
    container_name: music_app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: music_app
      POSTGRES_USER: music
      POSTGRES_PASSWORD: music
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: